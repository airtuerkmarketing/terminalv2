<?xml version="1.0" encoding="UTF-8"?>
<!-- terminal app favicon — the bare A-mark (no plate). Adaptive: the mark is
     near-black on light browser chrome and flips to white under a dark
     prefers-color-scheme so it never vanishes on a dark tab bar. Geometry is
     the 32x32 mark from images/terminal_logo. -->
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .mark { fill: #010101; }
    @media (prefers-color-scheme: dark) {
      .mark { fill: #ffffff; }
    }
  </style>
  <polygon class="mark" points="1.05 2.31 10.99 19.53 14.25 13.92 7.59 2.31 1.05 2.31"/>
  <polygon class="mark" points="10.82 5.29 13.99 10.92 27.72 10.92 30.95 5.29 10.82 5.29"/>
  <polygon class="mark" points="16.91 12.34 23.44 12.34 13.45 29.69 10.17 24.04 16.91 12.34"/>
</svg>
